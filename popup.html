<!DOCTYPE html>
<html>
<head>
    <title>Study Mode</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Study Mode</h2>

        <div class="timer" id="timer">00:00:00</div>

        <button id="toggleBtn" class="disabled">Enable Study Mode</button>

        <button id="timerBtn" class="timer-btn">Start Timer</button>

        <p class="status" id="statusText">Study Mode OFF</p>
    </div>

    <script src="popup.js"></script>
</body>
</html>
